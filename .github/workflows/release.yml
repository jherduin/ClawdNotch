name: Release

on:
  push:
    tags:
      - "v*"

# Nécessaire pour que `gh release create` puisse publier la Release et l'asset.
permissions:
  contents: write

jobs:
  release:
    name: Build, empaquetage .dmg et GitHub Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Déterminer la version depuis le tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Installer XcodeGen
        run: brew install xcodegen

      - name: Générer le projet Xcode
        run: xcodegen generate

      - name: Compiler (Release, sans signing)
        run: |
          xcodebuild \
            -project ClawdNotch.xcodeproj \
            -scheme ClawdNotch \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Créer le .dmg
        run: |
          APP="build/Build/Products/Release/ClawdNotch.app"
          DMG="ClawdNotch-${{ steps.version.outputs.version }}.dmg"
          STAGING="$(mktemp -d)"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "ClawdNotch" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Créer la GitHub Release et attacher le .dmg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$DMG" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
