name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule un build en cours si un nouveau commit est poussé sur la même réf.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (sans signing)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer XcodeGen
        run: brew install xcodegen

      - name: Générer le projet Xcode
        run: xcodegen generate

      - name: Compiler (Release, sans signing)
        run: |
          xcodebuild \
            -project ClawdNotch.xcodeproj \
            -scheme ClawdNotch \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
